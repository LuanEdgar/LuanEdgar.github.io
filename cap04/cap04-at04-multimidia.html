<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Recursos Multimídia — Cap. 4 / Ativ. 4</title>
</head>

<body>

    <header>
        <h1>Recursos Multimídia</h1>
    </header>

    <main>

        <!-- BLOCO 1 -->

        <figure>

            <video controls width="800" height="450"
                poster="poster-aula.jpg"
                preload="metadata">

                <source src="videos/aula-html.mp4" type="video/mp4">

                <source src="videos/aula-html.webm" type="video/webm">

                <track
                    src="legendas/aula-html.vtt"
                    kind="subtitles"
                    srclang="pt"
                    label="Português"
                    default>

                <p>
                    Seu navegador não suporta vídeo.
                    <a href="videos/aula-html.mp4">
                        Baixar vídeo
                    </a>
                </p>

            </video>

            <figcaption>
                Aula de HTML5 com exemplos práticos. Fonte: Curso Web.
            </figcaption>

        </figure>

        <hr>

        <!-- BLOCO 2 -->

        <figure>

            <audio controls preload="metadata">

                <source src="audios/podcast.mp3" type="audio/mpeg">

                <source src="audios/podcast.ogg" type="audio/ogg">

                <p>
                    Seu navegador não suporta áudio.
                    <a href="audios/podcast.mp3">
                        Baixar áudio
                    </a>
                </p>

            </audio>

            <figcaption>
                Podcast sobre tecnologias web.
                <a href="transcricao.html">
                    Ver transcrição
                </a>
            </figcaption>

        </figure>

        <hr>

        <!-- BLOCO 3 -->

        <figure>

            <iframe
                width="800"
                height="450"
                src="https://www.youtube-nocookie.com/embed/3oSIqIqzN3M"
                title="Curso de HTML5 para iniciantes"
                loading="lazy"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>

            <figcaption>
                Vídeo do canal Curso em Vídeo no YouTube.
            </figcaption>

        </figure>

        <hr>

        <!-- BLOCO 4 -->

        <figure>

            <picture>

                <source
                    media="(min-width: 768px)"
                    srcset="img/banner-wide.jpg">

                <img
                    src="img/banner-mobile.jpg"
                    alt="Banner sobre desenvolvimento web"
                    width="800"
                    height="400">

            </picture>

            <figcaption>
                Banner ilustrando tecnologias de desenvolvimento web.
            </figcaption>

        </figure>

    </main>

    <footer>
        <p>Nome: Luan Edgar Maia Teixeira</p>
        <p>Matrícula: 2026315581</p>
        <p>Data: 06/08/2010</p>
    </footer>

</body>

</html>
